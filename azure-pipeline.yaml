# azure-pipelines-app.yaml

trigger:
  branches:
    include:
      - main

stages:
- stage: DeployApp
  displayName: "Deploy Application via Ansible"

  jobs:
  - job: App_Deployment
    displayName: "Run Ansible Playbook"
    timeoutInMinutes: 60

    pool:
      name: "Self-hosted-pool-3"

    steps:

    # 1. Ensure required tools exist (idempotent install)
    - script: |
        set -e

        if ! command -v ansible >/dev/null 2>&1; then
          echo "Installing Ansible..."
          sudo apt update
          sudo apt install -y ansible sshpass
        else
          echo "Ansible already installed"
          ansible --version
        fi
      displayName: "Ensure Ansible Installed"

    # 2. Download private SSH key securely
    - task: DownloadSecureFile@1
      name: download_private_key
      inputs:
        secureFile: "id_rsa"

    # 3. Configure SSH environment
    - script: |
        set -e

        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        cp $(download_private_key.secureFilePath) ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        # Disable host key checking cleanly
        cat <<EOF > ~/.ssh/config
        Host *
          StrictHostKeyChecking no
          UserKnownHostsFile=/dev/null
        EOF

        echo "SSH setup complete"
      displayName: "Configure SSH"

    # 4. Validate SSH connectivity BEFORE running Ansible
    - script: |
        set -e

        echo "Testing SSH connectivity..."

        while read host; do
          echo "Checking $host..."
          ssh -i ~/.ssh/id_rsa -o ConnectTimeout=10 azureuser@$host "echo Connected to $host"
        done < ansible/hosts.txt

        echo "All hosts reachable"
      displayName: "Pre-check SSH Connectivity"

    # 5. Run Ansible Playbook (strict + explicit)
    - script: |
        set -e

        cd ansible

        ansible-playbook \
          -i inventory.ini site.yml \
          --private-key ~/.ssh/id_rsa \
          -u azureuser \
          --forks 5 \
          -vv
      displayName: "Run Ansible Playbook"

      env:
        ANSIBLE_HOST_KEY_CHECKING: "False"
        ANSIBLE_RETRY_FILES_ENABLED: "False"