# azure-pipelines-app.yaml

trigger:
  branches:
    include:
      - main

stages:
  - stage: DeployApp
    displayName: "Deploy Application Code via Ansible"
    jobs:
      - job: App_Deployment
        displayName: "Run Ansible Playbook to Deploy App"
        pool:
          name: "Self-hosted-pool-3"

        steps:
          - script: |
              sudo apt update
              sudo apt install -y ansible sshpass
            displayName: "Install Ansible & SSH dependencies"

          - task: DownloadSecureFile@1
            name: download_private_key
            inputs:
              secureFile: "epicbook_key"

          - script: |
              mkdir -p ~/.ssh
              cp $(download_private_key.secureFilePath) ~/.ssh/epicbook_key
              chmod 600 ~/.ssh/epicbook_key
              echo "StrictHostKeyChecking no" > ~/.ssh/config
            displayName: "Setup SSH Private Key"

          - script: |
              echo "Validating SSH key..."

              file ~/.ssh/epicbook_key
              head -n 2 ~/.ssh/epicbook_key
              tail -n 2 ~/.ssh/epicbook_key

              ssh-keygen -l -f ~/.ssh/epicbook_key
            displayName: "Validate SSH Key"
          
          - script: |
              cd ansible
              ansible-playbook -i inventory.ini site.yml --ssh-extra-args "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            displayName: "Run Ansible Playbook"
            env:
              ANSIBLE_HOST_KEY_CHECKING: "False"
